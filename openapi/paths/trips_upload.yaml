post:
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/trips.yaml
    required: true
  tags:
    - eTrips
  parameters:
    - example: 'AppVersion : 2.2.11232'
      name: AppVersion
      schema:
        type: string
      in: header
      required: true
    - example: 'Platform : iOS'
      name: Platform
      schema:
        type: string
      in: header
    - example: 'AppName : ETRIPS'
      name: AppName
      schema:
        type: string
      in: header
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/trip_upload_response.yaml
      description: successful upload attempt
  security:
    - Confidential-API: []
  summary: 'trips_upload '
  description: >-
    send a set of trips rows to safis. Resubmissions of trips previously
    submitted and processed successfully should include the accsp_trip_id
    (provided in response for successful submissions) and a trip_update flag
    (set value to Y). See example request.
