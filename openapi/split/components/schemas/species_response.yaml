title: SPECIES
description: ''
required:
  - status
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        species_qc_id:
          format: int32
          description: unique row id used to detect changes to current records.
          type: integer
        species_itis:
          description: ITIS code of species
          type: string
        species_name:
          description: common name of species
          type: string
        scientific_name:
          description: scientific name of the species
          type: string
        uom:
          description: unit of measure
          type: string
        grade:
          description: grade code
          type: string
        grade_description:
          description: description of grade code
          type: string
        market:
          description: market code
          type: string
        market_description:
          description: description of market code
          type: string
        min_price:
          format: double
          description: expected minimum price in US dollars.
          type: number
        max_price:
          format: double
          description: expected maximum price in US dollars.
          type: number
        in_use:
          description: indicator for whether record is in-use currently
          enum:
            - 'Y'
            - 'N'
          type: string
        hms:
          description: HMS Flag indicator
          enum:
            - 'Y'
            - 'N'
          type: string
        shark:
          description: Shark Flag indicator
          enum:
            - 'Y'
            - 'N'
          type: string
        area:
          description: Flag on whether to collect Area Fished for this species.
          enum:
            - 'Y'
            - 'N'
          type: string
        comm_flag:
          description: Flag on whether the trip is commercial trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        for_hire_ch_flag:
          description: Flag on whether the trip is for hire charter trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        for_hire_hb_flag:
          description: Flag on whether the trip is for hire headboat trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        dealer_rpt_flag:
          description: Flag on whether dealer_rpt_flag.
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - species_qc_id: 81715
      species_itis: '171671'
      species_name: LANCES, SAND
      scientific_name: AMMODYTES
      uom: LB
      grade: '01'
      grade_description: ROUND
      market: UN
      market_description: UNCLASSIFIED
      min_price: 0.1
      max_price: 0.5
      in_use: 'N'
      hms: 'N'
      shark: 'N'
      area: 'N'
      comm_flag: 'Y'
      for_hire_ch_flag: 'Y'
      for_hire_hb_flag: 'Y'
      rec_flag: 'Y'
      dealer_rpt_flag: 'Y'
    - species_qc_id: 81768
      species_itis: '170333'
      species_name: MULLETS
      scientific_name: MUGILIDAE
      uom: LB
      grade: '01'
      grade_description: ROUND
      market: UN
      market_description: UNCLASSIFIED
      min_price: 0.01
      max_price: 1.5
      in_use: 'N'
      hms: 'N'
      shark: 'N'
      area: 'N'
      comm_flag: 'Y'
      for_hire_ch_flag: 'Y'
      for_hire_hb_flag: 'Y'
      rec_flag: 'Y'
      dealer_rpt_flag: 'Y'
  status: OK
  description: 2 Species(s) Returned
