title: GEARS
description: GEARS
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        code:
          description: gear code. Returned by the upload requests where gear is requested.
          type: string
        desc:
          description: gear name.
          type: string
        category_code:
          description: gear category code
          type: string
        category_name:
          description: gear category description
          type: string
        comm_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in commercial trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        for_hire_ch_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in for-hire charter trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        for_hire_hb_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in for-hire headboat trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        rec_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in recreational trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the result status
    type: string
example:
  row:
    - code: '077'
      desc: HOOP NET
      category_code: '070'
      category_name: OTHER FIXED NETS
      comm_flag: 'Y'
      for_hire_ch_flag: 'N'
      for_hire_hb_flag: 'N'
      rec_flag: 'N'
    - code: '407'
      desc: LONG LINES, DRIFT W/HOOKS
      category_code: '400'
      category_name: LONG LINES
      comm_flag: 'Y'
      for_hire_ch_flag: 'N'
      for_hire_hb_flag: 'N'
      rec_flag: 'N'
  status: OK
  description: 2 Gear(s) Returned
