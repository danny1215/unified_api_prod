title: DEALERS
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        corporate_name:
          description: company name if applicable
          type: string
        full_name:
          description: user's first and last name if applicable
          type: string
        license_nbr:
          description: Permit/License Number of Permit in use.
          type: string
        agency:
          description: 4 character identifier of issuing agency of permit in use
          type: string
        permit_id:
          format: int32
          description: ACCSP unique permit identifier
          type: integer
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - corporate_name: AQUACULTURAL RESEARCH CORP
      full_name: JAMES MADISON
      license_nbr: '0273'
      agency: '0003'
      permit_id: 155928
    - corporate_name: SAVAGEESE SEAFOODS, INC.
      full_name: JOHN DOE
      license_nbr: 283
      agency: '0003'
      permit_id: 100154
  status: OK
  description: 2 Dealers count
