title: HMS_GEARS
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        gear_code:
          description: gear code. Returned by the upload requests where gear is requested.
          type: string
        gear_name:
          description: gear name.
          type: string
        status:
          description: indicator for whether record is in-use currently
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - gear_code: '650'
      gear_name: HARPOONS
      status: 'Y'
    - gear_code: '324'
      gear_name: TROLL LINE, GREEN-STICK
      status: 'Y'
    - gear_code: '409'
      gear_name: LONG LINE, PELAGIC
      status: 'Y'
    - gear_code: '411'
      gear_name: BUOY GEAR, PELAGIC
      status: 'Y'
  status: OK
  description: 4 hms gears(s) Returned.
