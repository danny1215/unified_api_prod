title: PORTS
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        port:
          description: fips 6 digit port code.
          type: string
        fips_place_name:
          description: name of port
          type: string
        fips_county_name:
          description: county name of port location
          type: string
        state_postal:
          description: state abbreviation of port.
          type: string
        comm_flag:
          description: indicate for whether port should be an option on commercial trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        for_hire_hb_flag:
          description: >-
            indicate for whether port should be an option on For-Hire Headboat
            trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        for_hire_ch_flag:
          description: >-
            indicate for whether port should be an option on For-Hire Charter
            trip.
          enum:
            - 'Y'
            - 'N'
          type: string
        rec_flag:
          description: indicate for whether port should be an option on Recreational trip.
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - port: '117035'
      fips_place_name: HOME PORT MARINA
      fips_county_name: PINELLAS
      state_postal: FL
      comm_flag: 'N'
      for_hire_hb_flag: 'Y'
      for_hire_ch_flag: 'Y'
      rec_flag: 'Y'
    - port: '118435'
      fips_place_name: DON'S DOCK
      fips_county_name: PINELLAS
      state_postal: FL
      comm_flag: 'N'
      for_hire_hb_flag: 'Y'
      for_hire_ch_flag: 'Y'
      rec_flag: 'Y'
  status: OK
  description: 2 Ports(s) Returned
