post:
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/event_id.yaml
    required: true
  tags:
    - eDR
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/dealer_reports_error_response.yaml
      description: output of the endpoint
  security:
    - Confidential-API: []
  summary: 'reports_upload_errors '
  description: >-
    Fetch a list of errors from a dealer reports_upload attempt that did not
    load. 
