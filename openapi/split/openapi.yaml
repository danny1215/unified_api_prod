openapi: 3.0.2
info:
  title: Unified SAFIS API -Prod
  version: 1.0.70
  description: >-
    **Overview**


    This API is used by remote applications   to communicate with the SAFIS
    backend database server. It is not intended for any other purpose. This
    document is intended as a programmer’s reference manual. It is used by both
    application developers who build a front-end, and the programmers who
    maintain this   API back-end. 


    To request an API key, please contact us. 
  contact:
    email: support@accsp.org
  x-logo:
    url: >-
      https://raw.githubusercontent.com/accsp-software/spec-unified-api-prod/master/docs/accsp_logo.jpg
servers:
  - url: https://safis.accsp.org/safis_prod/safis_prod/api
    description: ''
tags:
  - name: eTrips
    description: eTrips
  - name: eDR
    description: eDR
