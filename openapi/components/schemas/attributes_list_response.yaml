title: ADDITIONAL_ATTRIBUTES
description: ''
type: object
properties:
  row:
    description: >-
      Data type for TRIP_ADDITIONAL_ATTRIBUTES, EFFORT_ADDITIONAL_ATTRIBUTES,
      CATCH_ADDITIONAL_ATTRIBUTES
    type: array
    items:
      type: object
      properties:
        attribute_code:
          format: int32
          description: unique attribute code/id
          type: integer
        attribute_name:
          description: name of attribute
          type: string
        help_text:
          description: accompanying help text
          type: string
        order_seq:
          format: int32
          description: display order of attribute relative to others
          type: integer
        attribute_count:
          description: indicates whether a single (S) value is returned or Multiple (M) are
          enum:
            - S
            - M
          type: string
        list_type:
          description: indicates whether the list is static (S) or Dynamic (D)
          enum:
            - S
            - D
          type: string
        type:
          type: string
        comm_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in commercial trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        for_hire_charter_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in for-hire charter trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        for_hire_hb_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in for-hire headboat trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
        rec_flag:
          description: >-
            indicates if attribute is required (R), optional (Y) or Not
            displayed (N) in recreational trip
          enum:
            - R
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - attribute_code: 3
      attribute_name: Target Species
      help_text: Choose one or more targeted species.
      order_seq: 1
      attribute_count: M
      list_type: D
      type: STRING
      comm_flag: 'Y'
      for_hire_charter_flag: 'N'
      for_hire_hb_flag: 'N'
      rec_flag: 'N'
  status: OK
  description: 1 Attribute(s) Returned
