title: PARTICIPANTS
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        ID:
          description: ACCSP unique participant id.
          type: string
        Name:
          description: First and Last Name of User / Corporate Name.
          type: string
        License_NBR:
          description: Agency issued license/ permit number
          type: string
        License_Type:
          description: Agency defined License type.
          type: string
        In_Use:
          description: indicator of whether record is currently in use.
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - ID: '125013'
      Name: MA FISHER (MA FISHER)
      License_NBR: test12
      License_Type: TEST
      In_Use: 'N'
    - ID: '143080'
      Name: TEST SUPER (SAFMC)
      License_NBR: '991011'
      License_Type: FEDERAL FOR-HIRE (TEST)
      In_Use: 'Y'
  status: OK
  description: 'Participants count: 2'
