title: HMS_TARGET_SPECIES
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        species_itis:
          description: ITIS code of species
          type: string
        common_name:
          description: Common name of the species
          type: string
        scientific_name:
          description: scientific name of the species.
          type: string
        status:
          description: indicator for whether record is in-use currently
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - species_itis: '172423'
      common_name: TUNA, YELLOWFIN
      scientific_name: THUNNUS ALBACARES
      status: 'Y'
    - species_itis: '159785'
      common_name: SHARK, UNC
      scientific_name: CHONDRICHTHYES
      status: 'Y'
  status: OK
  description: 2 hms Species(s) Returned.
