title: VESSELS
description: ''
type: object
properties:
  row:
    type: array
    items:
      type: object
      properties:
        id:
          format: int32
          description: unique id of vessel
          type: string
        name:
          description: name of vessel
          type: string
        state:
          description: US state abbreviation for registered state
          type: string
        coast_guard:
          description: US Coast Guard Number of vessel
          type: string
        state_reg:
          description: State Registration Number of vessel
          type: string
        permits:
          type: array
          items:
            type: object
            properties:
              num:
                description: permit number of vessel
                type: string
              agency:
                description: 4 character issuing agency of the vessel permit number
                type: string
              in_use:
                description: indicator of whether the permit record is in use currently.
                enum:
                  - 'Y'
                  - 'N'
                type: string
        in_use:
          description: indicator of whether the vessel record is in use currently.
          enum:
            - 'Y'
            - 'N'
          type: string
  status:
    description: status of the request
    enum:
      - OK
      - FAIL
    type: string
  description:
    description: human readable description of the status of request
    type: string
example:
  row:
    - id: '1234'
      name: RUTHIE B
      state: MA
      coast_guard: '121212'
      permits:
        - num: SERO-4321
          agency: '0016'
          in_use: 'Y'
          start_date: 08/05/2022
          end_date: 07/31/2023
          permit_type_list: BLU 1
        - num: '332211'
          agency: 18
          in_use: 'Y'
          start_date: 03/01/2022
          end_date: 04/30/2023
          permit_type_list: BLU 1
      in_use: 'Y'
    - id: '111222'
      name: THE GIPPER
      state: NJ
      coast_guard: '441122'
      permits:
        - num: SERO-123456
          agency: '0016'
          in_use: 'Y'
          start_date: 08/01/2022
          end_date: 07/31/2023
          permit_type_list: BLU 1
        - num: '9876543'
          agency: 18
          in_use: 'Y'
          start_date: 04/01/2022
          end_date: 04/30/2023
          permit_type_list: BLU 1
      in_use: 'Y'
  status: OK
  description: 1+ Vessel(s) Returned
