description: >-
  trip level information. Either of state_reg_nbr or coast_guard_nbr is
  required. 
required:
  - trip_start_date
  - trip_type
  - cf_license_nbr
  - port
  - iss_agency
  - supplier_trip_id
  - trip_end_date
type: object
properties:
  accsp_trip_id:
    description: uniquie character number of trip
    type: string
  trip_start_date:
    format: date
    description: Calendar date of beginning of fishing trip. Format MM/DD/YYYY
    type: string
  trip_end_date:
    format: date
    description: Calendar date of ending of fishing trip. Format MM/DD/YYYY
    type: string
  trip_type:
    description: >-
      Trip Type undertaken. Commercial (C), Recreational (R), For
      Hire-Charter(A), For Hire-Headboat (H)
    enum:
      - C
      - R
      - A
      - H
    type: string
  trip_start_time:
    description: Calendar time of start of fishing trip. Format hh24:mi
    type: string
  trip_end_time:
    description: Calendar time of end of fishing trip. Format hh24:mi
    type: string
  vessel_permit:
    description: Vessel Permit number of vessel in use.
    type: string
  vtr_number:
    description: Vessel Trip Report number. Auto-generated by the application.
    type: string
  trip_activity:
    description: Indicator for intended/final outcome of fishing trip.
    type: string
  state_reg_nbr:
    description: >-
      State Registration number of vessel. If no vessel used, provide
      'FROM_SHORE'. Required to provide either coast_guard_nbr or state_reg_nbr.
    type: string
  coast_guard_nbr:
    description: >-
      Coast Guard Number/Hull Number of vessel. Required to provide either
      coast_guard_nbr or state_reg_nbr.
    type: string
  port:
    description: End Port of vessel.
    type: string
  supplier_trip_id:
    description: >-
      Unique trip id given by the caller. Only used to communicate errors and
      updates.
    type: string
  participant_id:
    description: ACCSP Participant idenitifier of captain reporting.
    type: string
  iss_agency:
    description: 4 character identifier of issuing agency of permit in use
    type: string
  cf_license_nbr:
    description: Permit/License Number of Permit in use.
    type: string
  garfo_vendor_id:
    description: GARFO vendor ID
    type: string
  garfo_client_id:
    description: GARFO client ID
    type: string
  garfo_token:
    description: GARFO Open ID token
    type: string
  efforts:
    description: Collection of efforts made with this trip.
    type: array
    items:
      $ref: ./effort.yaml
  trip_additional_attributes:
    description: Collection of supplemental attributes collected at the trip-header level.
    type: array
    items:
      $ref: ./attribute.yaml
  trips_update:
    description: whether a trip is resubmitted or not
    enum:
      - 'Y'
      - 'N'
    type: string
example:
  accsp_trip_id: '11122'
  cf_license_nbr: CTFISHER
  iss_agency: '0005'
  trip_type: C
  supplier_trip_id: 62220035128937
  port: '071001'
  state: '23'
  coast_guard_nbr: '1093639'
  state_reg_nbr: ''
  trip_start_date: 06/21/2020
  trip_start_time: '2142'
  trip_end_date: 06/21/2020
  report_completion_date: 06/21/2020
  trip_end_time: '2252'
  garfo_vendor_id: '123456'
  garfo_client_id: '112233'
  garfo_token: AAA123BBB123CCC123DDD123EEE123FFF123GGGH
  vtr_number: '9929220020912'
  vessel_permit: '12345'
  trip_activity: '0'
  trip_update: 'Y'
  efforts:
    - distance: '1'
      in_state: RI
      area_code: '539'
      sub_area_code: '0132'
      local_area_code: '00'
      latitude: '41.4450635115479'
      longitude: '-71.3559923529778'
      gear: '300'
      lma: ''
      gear_quantity: '16'
      gear_sets: '23'
      fishing_hours: '6.0'
      hours_days: H
      total_gear: '0'
      gear_size: ''
      mesh_ring_length: ''
      mesh_ring_width: ''
      stretch_size: ''
      target_species: ''
      avg_depth: '55'
      supplier_effort_id: '120119073102827'
      catches:
        - species_itis: '161706'
          disposition: '001'
          market_code: UN
          grade_code: '01'
          unit_of_measure: LB
          sale_disposition_flag: D
          dealer_license_nbr: ''
          date_sold: ''
          reported_quantity: '2'
          price: '0.00'
          dea_iss_agency: ''
          catch_source: S
          catch_latitude: ''
          catch_longitude: ''
          supplier_catch_id: 62220035129010
          nbr_of_fish: '0'
          offload_port: ''
          unit_of_length: ''
          length: ''
          species_attributes: []
          sale_disposition_attributes: []
  trip_additional_attributes:
    - code: '040'
      value: 'Y'
