title: negative trip
description: no-fishing report/negative trip
required:
  - cf_license_nbr
  - start_date
  - supplier_row_id
  - iss_agency
type: object
properties:
  supplier_row_id:
    description: >-
      unique identifier given by sender. Useful for updating information and
      retrieving errors. 
    type: string
  iss_agency:
    description: 4 digit identification of the issuing agency of permit
    type: string
  start_date:
    format: date
    description: start date of the negative/no fishing report
    type: string
  end_date:
    format: date
    description: last date of negative report if a range is being given
    type: string
  cf_license_nbr:
    description: license number given by issuing agency
    type: string
  state_reg_nbr:
    description: >-
      State Registration number of vessel. If no vessel used, provide
      'FROM_SHORE'.
    type: string
  coast_guard_nbr:
    description: Coast Guard Number/Hull Number of vessel.
    type: string
example:
  supplier_row_id: '1231231'
  iss_agency: '0003'
  start_date: 11/22/2015
  end_date: 11/22/2015
  cf_license_nbr: '999999'
